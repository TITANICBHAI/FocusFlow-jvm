<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusFlow for Windows — by TBTechs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #09090F; color: #E8E6F0;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .wrap { max-width: 560px; text-align: center; }
    .logo-sub { font-size: 14px; color: #6C63FF; margin-bottom: 32px; }
    h1 { font-size: 36px; font-weight: 700; margin-bottom: 12px; }
    .tagline { font-size: 16px; color: #9D97CC; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-block;
      padding: 12px 28px; border-radius: 10px;
      font-size: 15px; font-weight: 500;
      text-decoration: none; transition: opacity .15s;
    }
    a.btn:hover { opacity: .85; }
    .primary { background: #6C63FF; color: #fff; }
    .secondary { background: #1C1B26; color: #9D97CC; border: 1px solid #252436; }
    footer { margin-top: 56px; font-size: 13px; color: #49475E; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-sub">by TBTechs</div>
  <h1>FocusFlow for Windows</h1>
  <p class="tagline">Deep Focus &amp; App Blocker — available on the Microsoft Store</p>
  <div class="links">
    <a class="btn primary" href="privacy-policy/">Privacy Policy</a>
    <a class="btn secondary" href="terms-of-service/">Terms of Service</a>
    <a class="btn secondary" href="https://github.com/TITANICBHAI/FocusFlow-jvm">GitHub</a>
  </div>
  <footer>© 2025 TBTechs</footer>
</div>
</body>
</html>
