name: Build Windows EXE / MSI / MSIX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 19 (x64)
        uses: actions/setup-java@v4
        with:
          java-version: '19'
          distribution: 'temurin'
          architecture: 'x64'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Generate app icon (icon.ico)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src\main\resources" | Out-Null
          Add-Type -AssemblyName System.Drawing

          function New-IconBitmap([int]$size) {
            $bmp = New-Object System.Drawing.Bitmap($size, $size)
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.SmoothingMode    = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
            $g.TextRenderingHint = [System.Drawing.Text.TextRenderingHint]::AntiAlias
            $bgBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(144,102,238))
            $g.FillRectangle($bgBrush, 0, 0, $size, $size)
            $fgBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
            $fontSize = [int]($size * 0.34)
            if ($fontSize -lt 4) { $fontSize = 4 }
            $font = New-Object System.Drawing.Font("Arial", $fontSize, [System.Drawing.FontStyle]::Bold)
            $sf   = New-Object System.Drawing.StringFormat
            $sf.Alignment     = [System.Drawing.StringAlignment]::Center
            $sf.LineAlignment = [System.Drawing.StringAlignment]::Center
            $rect = New-Object System.Drawing.RectangleF(0, 0, $size, $size)
            $g.DrawString("FF", $font, $fgBrush, $rect, $sf)
            $g.Dispose()
            return $bmp
          }

          $sizes = @(16, 24, 32, 48, 64, 128, 256)
          $bitmaps = $sizes | ForEach-Object { New-IconBitmap $_ }

          $ms = New-Object System.IO.MemoryStream
          $bw = New-Object System.IO.BinaryWriter($ms)

          $bw.Write([uint16]0)
          $bw.Write([uint16]1)
          $bw.Write([uint16]$sizes.Count)

          $dataOffset = 6 + $sizes.Count * 16
          $pngBuffers = @()

          foreach ($bmp in $bitmaps) {
            $pngMs = New-Object System.IO.MemoryStream
            $bmp.Save($pngMs, [System.Drawing.Imaging.ImageFormat]::Png)
            $pngBuffers += ,$pngMs.ToArray()
            $pngMs.Dispose()
          }

          for ($i = 0; $i -lt $sizes.Count; $i++) {
            $s = $sizes[$i]; if ($s -eq 256) { $s = 0 }
            $bw.Write([byte]$s)
            $bw.Write([byte]$s)
            $bw.Write([byte]0)
            $bw.Write([byte]0)
            $bw.Write([uint16]1)
            $bw.Write([uint16]32)
            $bw.Write([uint32]$pngBuffers[$i].Length)
            $bw.Write([uint32]$dataOffset)
            $dataOffset += $pngBuffers[$i].Length
          }

          foreach ($buf in $pngBuffers) { $bw.Write($buf) }

          $bw.Flush()
          [System.IO.File]::WriteAllBytes("src\main\resources\icon.ico", $ms.ToArray())
          $ms.Dispose()
          Write-Host "icon.ico created (sizes: $($sizes -join ', ')px)"

      - name: Build EXE (bundled JRE, x64)
        run: gradle packageExe --no-daemon --stacktrace
        shell: cmd

      - name: Build MSI
        run: gradle packageMsi --no-daemon
        shell: cmd
        continue-on-error: true

      - name: Build Distributable (for MSIX)
        run: gradle createDistributable --no-daemon
        shell: cmd

      - name: Package MSIX
        shell: pwsh
        run: |
          $appDir    = "build\compose\binaries\main\app\FocusFlow"
          $msixStage = "build\msix-stage"
          $msixOut   = "build\FocusFlow-1.0.0-x64.msix"

          if (-not (Test-Path $appDir)) {
            Write-Warning "Distributable not found at $appDir — skipping MSIX"
            exit 0
          }

          # Create stage dirs fresh
          if (Test-Path $msixStage) { Remove-Item -Recurse -Force $msixStage }
          New-Item -ItemType Directory -Force -Path "$msixStage\Assets" | Out-Null

          # Copy distributable files (may include a stale AppxManifest.xml — we'll overwrite it)
          Copy-Item -Recurse -Force "$appDir\*" "$msixStage\"

          # Write AppxManifest.xml explicitly — PublisherDisplayName must be "TBTechs"
          $manifestXml = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"',
            '         xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"',
            '         xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">',
            '  <Identity Name="TBTechs.FocusFlow"',
            '            Version="1.0.0.0"',
            '            Publisher="CN=TBTechs"',
            '            ProcessorArchitecture="x64" />',
            '  <Properties>',
            '    <DisplayName>FocusFlow</DisplayName>',
            '    <PublisherDisplayName>TBTechs</PublisherDisplayName>',
            '    <Logo>Assets\Square150x150Logo.png</Logo>',
            '  </Properties>',
            '  <Dependencies>',
            '    <TargetDeviceFamily Name="Windows.Desktop"',
            '                        MinVersion="10.0.17763.0"',
            '                        MaxVersionTested="10.0.19041.0" />',
            '  </Dependencies>',
            '  <Resources>',
            '    <Resource Language="en-us" />',
            '  </Resources>',
            '  <Applications>',
            '    <Application Id="FocusFlow"',
            '                 Executable="FocusFlow.exe"',
            '                 EntryPoint="Windows.FullTrustApplication">',
            '      <uap:VisualElements',
            '        DisplayName="FocusFlow"',
            '        Description="Focus and productivity app with real app blocking"',
            '        BackgroundColor="transparent"',
            '        Square150x150Logo="Assets\Square150x150Logo.png"',
            '        Square44x44Logo="Assets\Square44x44Logo.png">',
            '      </uap:VisualElements>',
            '    </Application>',
            '  </Applications>',
            '  <Capabilities>',
            '    <rescap:Capability Name="runFullTrust" />',
            '  </Capabilities>',
            '</Package>'
          ) -join "`r`n"

          $manifestPath = "$msixStage\AppxManifest.xml"
          [System.IO.File]::WriteAllText($manifestPath, $manifestXml, [System.Text.Encoding]::UTF8)

          # Verify PublisherDisplayName is correct before packing
          $written = [System.IO.File]::ReadAllText($manifestPath)
          if ($written -notmatch 'PublisherDisplayName>TBTechs<') {
            Write-Error "FATAL: AppxManifest.xml does not contain PublisherDisplayName=TBTechs. Aborting."
            Write-Host "=== Manifest content ==="
            Write-Host $written
            exit 1
          }
          Write-Host "Manifest verified — PublisherDisplayName=TBTechs confirmed."
          Write-Host "=== AppxManifest.xml ==="
          Write-Host $written

          # Generate store logos
          Add-Type -AssemblyName System.Drawing
          function Save-Logo([string]$path, [int]$w, [int]$h) {
            $bmp  = New-Object System.Drawing.Bitmap($w, $h)
            $g    = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(144,102,238))
            $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
            $font  = New-Object System.Drawing.Font("Arial", [int]($h * 0.32), [System.Drawing.FontStyle]::Bold)
            $sf    = New-Object System.Drawing.StringFormat
            $sf.Alignment = [System.Drawing.StringAlignment]::Center
            $sf.LineAlignment = [System.Drawing.StringAlignment]::Center
            $g.DrawString("FF", $font, $brush, (New-Object System.Drawing.RectangleF(0,0,$w,$h)), $sf)
            $g.Dispose()
            $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
          }
          Save-Logo "$msixStage\Assets\Square150x150Logo.png" 150 150
          Save-Logo "$msixStage\Assets\Square44x44Logo.png"    44  44
          Save-Logo "$msixStage\Assets\Square30x30Logo.png"    30  30
          Save-Logo "$msixStage\Assets\Square71x71Logo.png"    71  71
          Save-Logo "$msixStage\Assets\Square310x310Logo.png" 310 310
          Save-Logo "$msixStage\Assets\Wide310x150Logo.png"   310 150

          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $makeAppx = Get-ChildItem "$sdkRoot\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
                      Sort-Object FullName -Descending | Select-Object -First 1

          if ($null -eq $makeAppx) {
            Write-Warning "makeappx.exe not found — skipping MSIX"
            exit 0
          }

          Write-Host "Using makeappx: $($makeAppx.FullName)"
          & $makeAppx.FullName pack /d "$msixStage" /p "$msixOut" /nv /o
          if ($LASTEXITCODE -ne 0) {
            Write-Error "makeappx failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          if (Test-Path $msixOut) {
            $sizeMB = [math]::Round((Get-Item $msixOut).Length / 1MB, 1)
            Write-Host "MSIX created: $msixOut ($sizeMB MB)"
          } else {
            Write-Warning "MSIX output file not found after makeappx"
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Windows-EXE
          path: build/compose/binaries/main/exe/*.exe
          retention-days: 30

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Windows-MSI
          path: build/compose/binaries/main/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Windows-MSIX
          path: build/FocusFlow-1.0.0-x64.msix
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: FocusFlow-Windows-EXE
          path: ./dist

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: FocusFlow-Windows-MSI
          path: ./dist
          merge-multiple: true

      - name: Download MSIX
        uses: actions/download-artifact@v4
        with:
          name: FocusFlow-Windows-MSIX
          path: ./dist
          merge-multiple: true
        continue-on-error: true

      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `build-${context.runNumber}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            core.setOutput('tag', tag);
        id: create_tag

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: FocusFlow JVM — Build ${{ github.run_number }}
          body: |
            ### FocusFlow JVM — Windows Build ${{ github.run_number }}

            **Commit:** `${{ github.sha }}`

            ---

            #### Downloads
            | File | Format | Notes |
            |------|--------|-------|
            | `FocusFlow-1.0.0.exe` | EXE installer | Bundled JRE, recommended (~105 MB) |
            | `FocusFlow-1.0.0.msi` | MSI package | Enterprise/IT deployment |
            | `FocusFlow-1.0.0-x64.msix` | MSIX package | Modern Windows package — install with `Add-AppxPackage` |

            > **MSIX note:** `Add-AppxPackage .\FocusFlow-1.0.0-x64.msix` in PowerShell (developer mode or trust cert first).

            ---

            #### What's included
            - Real app blocking: `SetWinEventHook` (instant) + polling fallback via JNA
            - Windows Firewall rules via `netsh` + `New-NetFirewallRule`
            - Always-on-top block overlay
            - System tray icon — minimise to tray, toggle blocking from right-click menu
            - Windows balloon notifications on session start/end and app block
            - Sound aversion tones on app kill; chime on session start
            - Auto-start with Windows (HKCU Run key, no admin needed)
            - Weekly focus report (auto-notified every Sunday)
            - Keyword blocker, schedule-based blocking, daily allowances
            - Nuclear mode, break enforcer, session PIN gate
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.msix
          fail_on_unmatched_files: false
