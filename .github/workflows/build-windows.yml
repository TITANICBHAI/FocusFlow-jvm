name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Build EXE
        run: gradle packageExe --no-daemon --stacktrace
        shell: cmd

      - name: Build MSI
        run: gradle packageMsi --no-daemon
        shell: cmd
        continue-on-error: true

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Windows-EXE
          path: build/compose/binaries/main/exe/*.exe
          retention-days: 30

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Windows-MSI
          path: build/compose/binaries/main/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: FocusFlow-Windows-EXE
          path: ./dist

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: FocusFlow-Windows-MSI
          path: ./dist
          merge-multiple: true

      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `build-${context.runNumber}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            core.setOutput('tag', tag);
        id: create_tag

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: FocusFlow JVM — Build ${{ github.run_number }}
          body: |
            ### FocusFlow JVM — Windows Build ${{ github.run_number }}

            **Commit:** `${{ github.sha }}`

            #### Download
            - `FocusFlow-1.0.0.exe` — standalone installer (recommended, ~108 MB bundled JRE)
            - `FocusFlow-1.0.0.msi` — MSI package for enterprise/IT deployment

            #### What this version includes
            - Real app blocking: JNA `GetForegroundWindow` + `ProcessHandle.destroyForcibly()`
            - Windows Firewall rules via `netsh` + PowerShell `New-NetFirewallRule` (requires admin for network blocking)
            - Always-on-top block overlay shown when a blocked app is detected
            - Full task scheduler, focus timer, streaks, stats, temptation log
            - Session PIN with SHA-256 hash (ported from Android app)
            - SQLite database at `%USERPROFILE%/.focusflow/focusflow.db`
          files: ./dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
