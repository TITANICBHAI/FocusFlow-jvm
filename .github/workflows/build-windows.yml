name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Build EXE
        run: gradle packageExe --no-daemon --stacktrace
        shell: cmd

      - name: Build MSI
        run: gradle packageMsi --no-daemon
        shell: cmd
        continue-on-error: true

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Windows-EXE
          path: build/compose/binaries/main/exe/*.exe
          retention-days: 30

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Windows-MSI
          path: build/compose/binaries/main/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: FocusFlow-Windows-EXE
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: FocusFlow JVM — Build ${{ github.run_number }}
          body: |
            ### FocusFlow JVM — Automated Windows Build

            **Commit:** `${{ github.sha }}`

            **Download the EXE below** — run it on Windows, no Java installation needed (JRE bundled).

            #### What's included
            - Real app blocking via Win32 `GetForegroundWindow` + process kill
            - Windows Firewall rules for network blocking (requires admin)
            - Always-on-top block overlay
            - Full task scheduler, focus timer, streaks, stats
          files: ./dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
