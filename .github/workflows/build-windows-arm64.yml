name: Build Windows ARM64 MSIX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64-msix:
    runs-on: windows-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 19 (x64)
        uses: actions/setup-java@v4
        with:
          java-version: '19'
          distribution: 'temurin'
          architecture: 'x64'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Generate app icon (icon.ico)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src\main\resources" | Out-Null
          Add-Type -AssemblyName System.Drawing

          function New-IconBitmap([int]$size) {
            $bmp = New-Object System.Drawing.Bitmap($size, $size, [System.Drawing.Imaging.PixelFormat]::Format32bppArgb)
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias

            $bgColor  = [System.Drawing.Color]::FromArgb(255, 9, 9, 15)
            $bgBrush  = New-Object System.Drawing.SolidBrush($bgColor)
            $radius   = [int]($size * 0.22)
            $path     = New-Object System.Drawing.Drawing2D.GraphicsPath
            $path.AddArc(0, 0, $radius*2, $radius*2, 180, 90)
            $path.AddArc($size - $radius*2, 0, $radius*2, $radius*2, 270, 90)
            $path.AddArc($size - $radius*2, $size - $radius*2, $radius*2, $radius*2, 0, 90)
            $path.AddArc(0, $size - $radius*2, $radius*2, $radius*2, 90, 90)
            $path.CloseFigure()
            $g.FillPath($bgBrush, $path)

            $cx    = $size / 2.0
            $cy    = $size / 2.0
            $arcR  = $size * 0.345
            $sw    = [float]($size * 0.115)
            $left  = [float]($cx - $arcR)
            $top   = [float]($cy - $arcR)
            $diam  = [float]($arcR * 2.0)

            $cyanPen   = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(255, 79, 195, 247), $sw)
            $cyanPen.StartCap = [System.Drawing.Drawing2D.LineCap]::Round
            $cyanPen.EndCap   = [System.Drawing.Drawing2D.LineCap]::Round
            $g.DrawArc($cyanPen, $left, $top, $diam, $diam, -50.0, 190.0)

            $purplePen = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(255, 124, 77, 255), $sw)
            $purplePen.StartCap = [System.Drawing.Drawing2D.LineCap]::Round
            $purplePen.EndCap   = [System.Drawing.Drawing2D.LineCap]::Round
            $g.DrawArc($purplePen, $left, $top, $diam, $diam, 130.0, 130.0)

            $dashLen  = [float]($size * 0.16)
            $dashPen  = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(255, 102, 153, 238), [float]($size * 0.055))
            $dashPen.StartCap = [System.Drawing.Drawing2D.LineCap]::Round
            $dashPen.EndCap   = [System.Drawing.Drawing2D.LineCap]::Round
            $g.DrawLine($dashPen, [float]($cx - $dashLen), [float]$cy, [float]($cx + $dashLen), [float]$cy)

            $g.Dispose()
            return $bmp
          }

          $sizes = @(16, 24, 32, 48, 64, 128, 256)
          $bitmaps = $sizes | ForEach-Object { New-IconBitmap $_ }

          $ms = New-Object System.IO.MemoryStream
          $bw = New-Object System.IO.BinaryWriter($ms)

          $bw.Write([uint16]0)
          $bw.Write([uint16]1)
          $bw.Write([uint16]$sizes.Count)

          $dataOffset = 6 + $sizes.Count * 16
          $pngBuffers = @()

          foreach ($bmp in $bitmaps) {
            $pngMs = New-Object System.IO.MemoryStream
            $bmp.Save($pngMs, [System.Drawing.Imaging.ImageFormat]::Png)
            $pngBuffers += ,$pngMs.ToArray()
            $pngMs.Dispose()
          }

          for ($i = 0; $i -lt $sizes.Count; $i++) {
            $s = $sizes[$i]; if ($s -eq 256) { $s = 0 }
            $bw.Write([byte]$s)
            $bw.Write([byte]$s)
            $bw.Write([byte]0)
            $bw.Write([byte]0)
            $bw.Write([uint16]1)
            $bw.Write([uint16]32)
            $bw.Write([uint32]$pngBuffers[$i].Length)
            $bw.Write([uint32]$dataOffset)
            $dataOffset += $pngBuffers[$i].Length
          }

          foreach ($buf in $pngBuffers) { $bw.Write($buf) }

          $bw.Flush()
          [System.IO.File]::WriteAllBytes("src\main\resources\icon.ico", $ms.ToArray())
          $ms.Dispose()
          Write-Host "icon.ico created (sizes: $($sizes -join ', ')px)"

      - name: Build Distributable (for ARM64 MSIX)
        run: gradle createDistributable --no-daemon
        shell: cmd

      - name: Package ARM64 MSIX (neutral architecture — runs natively via x64 emulation on all Windows on Arm devices)
        shell: pwsh
        run: |
          $appDir    = "build\compose\binaries\main\app\FocusFlow"
          $msixStage = "build\msix-arm64-stage"
          $msixOut   = "build\FocusFlow-1.0.0-arm64.msix"

          if (-not (Test-Path $appDir)) {
            Write-Warning "Distributable not found at $appDir — skipping ARM64 MSIX"
            exit 0
          }

          # Create fresh staging directory
          if (Test-Path $msixStage) { Remove-Item -Recurse -Force $msixStage }
          New-Item -ItemType Directory -Force -Path "$msixStage\Assets" | Out-Null

          # Copy distributable files
          Copy-Item -Recurse -Force "$appDir\*" "$msixStage\"

          # ARM64 MSIX manifest
          # ProcessorArchitecture="neutral" — correct choice for JVM apps:
          #   Windows on Arm runs x64 apps natively via built-in x64 emulation (no AArch32 needed).
          #   "neutral" tells the Store this package works on ALL architectures,
          #   covering x64 (native), ARM64 (via emulation), and future Arm64EC devices.
          #   This is the Microsoft-recommended approach for JVM/cross-platform runtimes.
          $manifestXml = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"',
            '         xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"',
            '         xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">',
            '  <Identity Name="TBTechs.FocusFlowDeepFocusAppBlocker"',
            '            Version="1.0.0.0"',
            '            Publisher="CN=E08824C8-6F22-4DC2-8025-DD8C707E2BE9"',
            '            ProcessorArchitecture="neutral" />',
            '  <Properties>',
            '    <DisplayName>FocusFlow &#x2014; Deep Focus &amp; App Blocker</DisplayName>',
            '    <PublisherDisplayName>TBTechs</PublisherDisplayName>',
            '    <Logo>Assets\Square150x150Logo.png</Logo>',
            '  </Properties>',
            '  <Dependencies>',
            '    <TargetDeviceFamily Name="Windows.Desktop"',
            '                        MinVersion="10.0.17763.0"',
            '                        MaxVersionTested="10.0.19041.0" />',
            '  </Dependencies>',
            '  <Resources>',
            '    <Resource Language="en-us" />',
            '  </Resources>',
            '  <Applications>',
            '    <Application Id="FocusFlow"',
            '                 Executable="FocusFlow.exe"',
            '                 EntryPoint="Windows.FullTrustApplication">',
            '      <uap:VisualElements',
            '        DisplayName="FocusFlow"',
            '        Description="Deep focus and productivity app with real app blocking for Windows"',
            '        BackgroundColor="transparent"',
            '        Square150x150Logo="Assets\Square150x150Logo.png"',
            '        Square44x44Logo="Assets\Square44x44Logo.png">',
            '      </uap:VisualElements>',
            '    </Application>',
            '  </Applications>',
            '  <Capabilities>',
            '    <rescap:Capability Name="runFullTrust" />',
            '  </Capabilities>',
            '</Package>'
          ) -join "`r`n"

          $manifestPath = "$msixStage\AppxManifest.xml"
          [System.IO.File]::WriteAllText($manifestPath, $manifestXml, [System.Text.Encoding]::UTF8)

          # Verify manifest fields
          $written = [System.IO.File]::ReadAllText($manifestPath)
          $errors = @()
          if ($written -notmatch 'PublisherDisplayName>TBTechs<')                       { $errors += "PublisherDisplayName != TBTechs" }
          if ($written -notmatch 'Name="TBTechs\.FocusFlowDeepFocusAppBlocker"')        { $errors += "Identity Name wrong" }
          if ($written -notmatch 'Publisher="CN=E08824C8-6F22-4DC2-8025-DD8C707E2BE9"') { $errors += "Publisher wrong" }
          if ($written -notmatch 'ProcessorArchitecture="neutral"')                     { $errors += "ProcessorArchitecture must be neutral" }
          if ($errors.Count -gt 0) {
            Write-Error "FATAL: ARM64 AppxManifest.xml validation failed:`n$($errors -join "`n")"
            Write-Host $written
            exit 1
          }
          Write-Host "ARM64 manifest verified — ProcessorArchitecture=neutral confirmed."
          Write-Host "=== ARM64 AppxManifest.xml ==="
          Write-Host $written

          # Generate store logos
          Add-Type -AssemblyName System.Drawing
          function Save-Logo([string]$path, [int]$w, [int]$h) {
            $bmp = New-Object System.Drawing.Bitmap($w, $h, [System.Drawing.Imaging.PixelFormat]::Format32bppArgb)
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
            $g.Clear([System.Drawing.Color]::FromArgb(255, 9, 9, 15))

            $cx   = $w / 2.0; $cy = $h / 2.0
            $size = [Math]::Min($w, $h)
            $arcR = $size * 0.345; $sw = [float]($size * 0.115)
            $left = [float]($cx - $arcR); $top = [float]($cy - $arcR)
            $diam = [float]($arcR * 2.0)

            $cyanPen = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(255, 79, 195, 247), $sw)
            $cyanPen.StartCap = [System.Drawing.Drawing2D.LineCap]::Round
            $cyanPen.EndCap   = [System.Drawing.Drawing2D.LineCap]::Round
            $g.DrawArc($cyanPen, $left, $top, $diam, $diam, -50.0, 190.0)

            $purplePen = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(255, 124, 77, 255), $sw)
            $purplePen.StartCap = [System.Drawing.Drawing2D.LineCap]::Round
            $purplePen.EndCap   = [System.Drawing.Drawing2D.LineCap]::Round
            $g.DrawArc($purplePen, $left, $top, $diam, $diam, 130.0, 130.0)

            $dashLen = [float]($size * 0.16)
            $dashPen = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(255, 102, 153, 238), [float]($size * 0.055))
            $dashPen.StartCap = [System.Drawing.Drawing2D.LineCap]::Round
            $dashPen.EndCap   = [System.Drawing.Drawing2D.LineCap]::Round
            $g.DrawLine($dashPen, [float]($cx - $dashLen), [float]$cy, [float]($cx + $dashLen), [float]$cy)

            $g.Dispose()
            $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
          }
          Save-Logo "$msixStage\Assets\Square150x150Logo.png" 150 150
          Save-Logo "$msixStage\Assets\Square44x44Logo.png"    44  44
          Save-Logo "$msixStage\Assets\Square30x30Logo.png"    30  30
          Save-Logo "$msixStage\Assets\Square71x71Logo.png"    71  71
          Save-Logo "$msixStage\Assets\Square310x310Logo.png" 310 310
          Save-Logo "$msixStage\Assets\Wide310x150Logo.png"   310 150

          $sdkRoot  = "C:\Program Files (x86)\Windows Kits\10\bin"
          $makeAppx = Get-ChildItem "$sdkRoot\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
                      Sort-Object FullName -Descending | Select-Object -First 1

          if ($null -eq $makeAppx) {
            Write-Warning "makeappx.exe not found — skipping ARM64 MSIX"
            exit 0
          }

          Write-Host "Using makeappx: $($makeAppx.FullName)"
          & $makeAppx.FullName pack /d "$msixStage" /p "$msixOut" /nv /o
          if ($LASTEXITCODE -ne 0) {
            Write-Error "makeappx failed (ARM64) with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          if (Test-Path $msixOut) {
            $sizeMB = [math]::Round((Get-Item $msixOut).Length / 1MB, 1)
            Write-Host "ARM64 MSIX created: $msixOut ($sizeMB MB)"
          } else {
            Write-Warning "ARM64 MSIX output not found after makeappx"
          }

      - name: Upload ARM64 MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-Windows-ARM64-MSIX
          path: build/FocusFlow-1.0.0-arm64.msix
          retention-days: 30
          if-no-files-found: warn

  release-arm64:
    needs: build-arm64-msix
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download ARM64 MSIX
        uses: actions/download-artifact@v4
        with:
          name: FocusFlow-Windows-ARM64-MSIX
          path: ./dist-arm64
        continue-on-error: true

      - name: Create tag (ARM64)
        uses: actions/github-script@v7
        id: create_tag
        with:
          script: |
            const tag = `build-arm64-${context.runNumber}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            core.setOutput('tag', tag);

      - name: Create ARM64 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-arm64-${{ github.run_number }}
          name: FocusFlow JVM — ARM64 Build ${{ github.run_number }}
          body: |
            ### FocusFlow JVM — Windows on Arm Build ${{ github.run_number }}

            **Commit:** `${{ github.sha }}`

            ---

            #### ARM64 / Windows on Arm Package

            | File | Notes |
            |------|-------|
            | `FocusFlow-1.0.0-arm64.msix` | Neutral-architecture MSIX — runs on all Windows on Arm devices (Surface Pro X, Snapdragon X Elite, etc.) via Windows built-in x64 emulation |

            > **Install:** `Add-AppxPackage .\FocusFlow-1.0.0-arm64.msix` in PowerShell (developer mode or sideload trust required).
            >
            > **Architecture note:** This package uses `ProcessorArchitecture=neutral`, which is the correct approach for JVM apps on Windows on Arm.
            > Windows ARM64 devices run x64 apps natively via Microsoft's built-in x64 emulation layer — no AArch32 (deprecated 32-bit ARM) is involved.

            ---

            #### For the Microsoft Store
            Upload **both** MSIXes (x64 from the regular build + this ARM64/neutral one) to Partner Center.
            The Store will automatically serve the right package to each device.
          files: |
            dist-arm64/*.msix
          fail_on_unmatched_files: false
